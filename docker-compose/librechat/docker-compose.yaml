volumes:
  librechat_data:
  mongo_data:
  meilisearch_data:

networks:
  librechat:

services:
  mongodb:
    image: mongo:7
    container_name: librechat-mongodb
    restart: always
    networks:
      - librechat
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: librechat-meilisearch
    restart: always
    networks:
      - librechat
    volumes:
      - meilisearch_data:/meili_data
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-changeme}

  librechat:
    image: ghcr.io/danny-avila/librechat-dev:latest
    container_name: librechat
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - JWT_SECRET=${JWT_SECRET:-changeme-jwt-secret-32chars-min}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-changeme-refresh-secret-32chars}
      - CREDS_KEY=${CREDS_KEY:-f34be427ebb29de8d88c107a71546019}
      - CREDS_IV=${CREDS_IV:-e2341419ec3dd3d19b13a1a87fafcbfb}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Meilisearch
      - SEARCH=true
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-changeme}
    ports:
      - "3080:3080"
    networks:
      - librechat
    volumes:
      - librechat_data:/app/client/public/images
      - ./librechat.yaml:/app/librechat.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
